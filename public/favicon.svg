  <!-- Hollow anchor nodes -->
  <circle cx="4" cy="20" r="3" fill="none" stroke="#f5715f" stroke-width="1.5" />
  <circle cx="20" cy="4" r="3" fill="none" stroke="#f5715f" stroke-width="1.5" />
</svg>
